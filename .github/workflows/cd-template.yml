# =============================================================================
# Distill — Reusable CD Template
# =============================================================================
# Reusable workflow for deploying individual services.
# Called by per-service CD workflows (cd-auth-service.yml, etc.)
# Steps: Build → Push to ECR → Update Helm → Deploy to K8s
# =============================================================================

name: CD Template

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Name of the service to deploy (e.g., auth-service)'
        required: true
        type: string
      dockerfile_path:
        description: 'Path to the Dockerfile relative to repo root'
        required: true
        type: string
      build_context:
        description: 'Docker build context path'
        required: false
        type: string
        default: '.'
      environment:
        description: 'Target environment (dev, staging, prod)'
        required: true
        type: string
      helm_chart_path:
        description: 'Path to the Helm chart directory'
        required: true
        type: string
      k8s_namespace:
        description: 'Kubernetes namespace to deploy to'
        required: false
        type: string
        default: 'distill'
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_REGION:
        required: true
      ECR_REGISTRY:
        required: true
      KUBE_CONFIG:
        required: true

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ---------------------------------------------------------------------------
  # Build & Push Docker Image to ECR
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/distill/${{ inputs.service_name }}:${{ env.IMAGE_TAG }}
            ${{ secrets.ECR_REGISTRY }}/distill/${{ inputs.service_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

      - name: Set output
        run: echo "image_uri=${{ secrets.ECR_REGISTRY }}/distill/${{ inputs.service_name }}:${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------------------
  # Security Scan
  # ---------------------------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-and-push.outputs.image_uri }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: ${{ inputs.environment == 'prod' && '1' || '0' }}

  # ---------------------------------------------------------------------------
  # Deploy via Helm
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [build-and-push, security-scan]
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Deploy with Helm
        run: |
          helm upgrade --install \
            ${{ inputs.service_name }} \
            ${{ inputs.helm_chart_path }} \
            --namespace ${{ inputs.k8s_namespace }} \
            --create-namespace \
            --set image.repository=${{ secrets.ECR_REGISTRY }}/distill/${{ inputs.service_name }} \
            --set image.tag=${{ env.IMAGE_TAG }} \
            --set environment=${{ inputs.environment }} \
            --values ${{ inputs.helm_chart_path }}/../../values/${{ inputs.environment }}.yaml \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/${{ inputs.service_name }} \
            -n ${{ inputs.k8s_namespace }} \
            --timeout=300s

      - name: Run smoke test
        run: |
          POD_NAME=$(kubectl get pods -n ${{ inputs.k8s_namespace }} \
            -l app=${{ inputs.service_name }} \
            -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n ${{ inputs.k8s_namespace }} $POD_NAME -- \
            curl -sf http://localhost:3000/health || \
            echo "::warning::Health check could not be verified via exec"

      - name: Post deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Service** | ${{ inputs.service_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.IMAGE_TAG }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Namespace** | ${{ inputs.k8s_namespace }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
