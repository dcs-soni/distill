# =============================================================================
# Distill — CI Pipeline
# =============================================================================
# Runs on every PR and push to main.
# Validates: lint, type-check, unit tests, Python checks, security audit,
# Docker builds, and container scanning.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  # ---------------------------------------------------------------------------
  # Node.js Checks — Lint, Type-check, Unit Tests
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint --workspaces --if-present

      - name: Run Prettier check
        run: npx prettier --check "**/*.{ts,tsx,js,jsx,json,md,yml}"

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check all workspaces
        run: npm run typecheck --workspaces --if-present

  helm-checks:
    name: Helm Lint & Template
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm Lint
        run: |
          helm lint infra/helm/charts/gateway --set secrets.JWT_PUBLIC_KEY=dummy
          helm lint infra/helm/charts/auth-service --set secrets.OIDC_CLIENT_ID=dummy,secrets.OIDC_CLIENT_SECRET=dummy,secrets.OIDC_ISSUER_URL=dummy,secrets.DATABASE_URL=dummy,secrets.JWT_PRIVATE_KEY=dummy,secrets.JWT_PUBLIC_KEY=dummy,secrets.OIDC_REDIRECT_URI=dummy,secrets.REDIS_URL=dummy
          helm lint infra/helm/charts/document-service --set secrets.DATABASE_URL=dummy,secrets.RABBITMQ_URL=dummy,secrets.S3_ENDPOINT=dummy,secrets.S3_ACCESS_KEY=dummy,secrets.S3_SECRET_KEY=dummy,secrets.S3_BUCKET=dummy

      - name: Helm Template
        run: |
          helm template infra/helm/charts/gateway --set secrets.JWT_PUBLIC_KEY=dummy
          helm template infra/helm/charts/auth-service --set secrets.OIDC_CLIENT_ID=dummy,secrets.OIDC_CLIENT_SECRET=dummy,secrets.OIDC_ISSUER_URL=dummy,secrets.DATABASE_URL=dummy,secrets.JWT_PRIVATE_KEY=dummy,secrets.JWT_PUBLIC_KEY=dummy,secrets.OIDC_REDIRECT_URI=dummy,secrets.REDIS_URL=dummy
          helm template infra/helm/charts/document-service --set secrets.DATABASE_URL=dummy,secrets.RABBITMQ_URL=dummy,secrets.S3_ENDPOINT=dummy,secrets.S3_ACCESS_KEY=dummy,secrets.S3_SECRET_KEY=dummy,secrets.S3_BUCKET=dummy

  test-node:
    name: Unit Tests (Node.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test --workspaces --if-present
        env:
          NODE_ENV: test

  # ---------------------------------------------------------------------------
  # Python Checks — Lint + Test (Extraction Service)
  # ---------------------------------------------------------------------------
  test-python:
    name: Python Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/extraction-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-cov pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with Ruff
        run: ruff check app/ tests/ --output-format=github
        continue-on-error: true # Don't fail CI until extraction service is built

      - name: Format check with Ruff
        run: ruff format --check app/ tests/
        continue-on-error: true

      - name: Run Python tests
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing
        continue-on-error: true # Don't fail CI until extraction service is built
        env:
          PYTHONPATH: .

  # ---------------------------------------------------------------------------
  # Security Audit
  # ---------------------------------------------------------------------------
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true # Warn but don't block on audit findings initially

  # ---------------------------------------------------------------------------
  # Docker Build Test — ensure all Dockerfiles build successfully
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: gateway
            context: .
            dockerfile: gateway/Dockerfile
          - name: auth-service
            context: .
            dockerfile: services/auth-service/Dockerfile
          - name: document-service
            context: .
            dockerfile: services/document-service/Dockerfile
          - name: extraction-service
            context: .
            dockerfile: services/extraction-service/Dockerfile
          - name: validation-service
            context: .
            dockerfile: services/validation-service/Dockerfile
          - name: review-service
            context: .
            dockerfile: services/review-service/Dockerfile
          - name: analytics-service
            context: .
            dockerfile: services/analytics-service/Dockerfile
          - name: notification-service
            context: .
            dockerfile: services/notification-service/Dockerfile
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f "${{ matrix.service.dockerfile }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::notice ::Dockerfile not found: ${{ matrix.service.dockerfile }} — skipping"
          fi

      - name: Build Docker image
        if: steps.check.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: false
          tags: distill/${{ matrix.service.name }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Container Security Scan — Trivy
  # ---------------------------------------------------------------------------
  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [gateway, auth-service, document-service, extraction-service]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Dockerfile exists
        id: check
        run: |
          DOCKERFILE=""
          if [ "${{ matrix.service }}" = "gateway" ]; then
            DOCKERFILE="gateway/Dockerfile"
          else
            DOCKERFILE="services/${{ matrix.service }}/Dockerfile"
          fi
          if [ -f "$DOCKERFILE" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "dockerfile=$DOCKERFILE" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build image for scanning
        if: steps.check.outputs.exists == 'true'
        run: docker build -f ${{ steps.check.outputs.dockerfile }} -t distill/${{ matrix.service }}:scan .

      - name: Run Trivy vulnerability scanner
        if: steps.check.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: distill/${{ matrix.service }}:scan
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0' # Don't fail initially, just report

      - name: Upload Trivy scan results
        if: steps.check.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # CI Gate — all checks must pass
  # ---------------------------------------------------------------------------
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-node, test-python, security-audit, docker-build, helm-checks]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Typecheck: ${{ needs.typecheck.result }}"
          echo "Node Tests: ${{ needs.test-node.result }}"
          echo "Python Tests: ${{ needs.test-python.result }}"
          echo "Security Audit: ${{ needs.security-audit.result }}"
          echo "Docker Build: ${{ needs.docker-build.result }}"
          echo "Helm Checks: ${{ needs.helm-checks.result }}"

          # Fail if any required job failed (exclude python + security as they may be skipped initially)
          if [[ "${{ needs.lint.result }}" == "failure" || \
                "${{ needs.typecheck.result }}" == "failure" || \
                "${{ needs.helm-checks.result }}" == "failure" || \
                "${{ needs.test-node.result }}" == "failure" ]]; then
            echo "::error::Required CI checks failed"
            exit 1
          fi

          echo "✅ All required CI checks passed"
